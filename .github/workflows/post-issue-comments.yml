name: Post fixed-issue comments

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [.github/workflows/post-issue-comments.yml]

permissions:
  issues: write

jobs:
  comment-136:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on #136
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=$(gh api repos/kelp/gale/issues/136/comments --jq length)
          if [ "$count" -gt 0 ]; then
            echo "Issue #136 already has comments; skipping"
            exit 0
          fi
          gh issue comment 136 --repo kelp/gale --body "Fixed on main (commit 688ce7d). See PR kelp/gale#136 for the merge."
