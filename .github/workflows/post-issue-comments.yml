name: Post fixed-issue comments

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [.github/workflows/post-issue-comments.yml]

permissions:
  issues: write

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Post closing comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          post_if_missing() {
            local num="$1"
            local file="$2"
            local count
            count=$(gh api "repos/kelp/gale/issues/${num}/comments" --jq 'length')
            if [ "$count" -eq 0 ]; then
              gh issue comment "$num" --repo kelp/gale --body-file "$file"
            else
              echo "Issue #${num} already has ${count} comment(s); skipping"
            fi
          }

          cat > /tmp/issue-136.md <<'EOF'
          Fixed in #136 (merged to `main` as 688ce7d).

          `installedStale` in `cmd/gale/sync.go` now evaluates staleness against the recipe's canonical `version-revision` dir — the path `Reinstall` actually writes — instead of the bare pin's highest on-disk revision. This stops the infinite rebuild loop when a withdrawn recipe revision leaves an orphan store dir (e.g. `1.0.0-2`) shadowing the recipe's `1.0.0-1`.

          Regression test: `TestRunSyncOneOrphanHigherRevisionDoesNotTriggerRebuild`.
          EOF
          post_if_missing 136 /tmp/issue-136.md

          cat > /tmp/issue-137.md <<'EOF'
          Fixed in #143 (merged to `main` as af4c3f6). Follow-up to #136.

          After #136 stopped sync from looping, bare-version resolution still preferred the highest revision on disk for generation rebuilds and gc retention — leaving stale binaries on PATH. This change:

          - Canonicalizes bare config pins to `recipe.Package.Full()` before generation rebuild (`canonicalizeForBuild`)
          - Uses recipe-canonical keys for gc retention (`storeRetentionKey`)
          - Rebuilds the active generation during gc only when it still links a superseded orphan while config uses a bare pin (`generationLinksSupersededOrphan`)

          Regression tests: `TestGCRemovesOrphanRevisionAboveRecipe`, `TestRebuildGenerationLinksRecipeRevisionOverOrphan`.
          EOF
          post_if_missing 137 /tmp/issue-137.md
