linters:
  enable:
    - bodyclose
    - errcheck
    - exhaustive
    - gocritic
    - gosec
    - ineffassign
    - nilerr
    - staticcheck
    - unparam

linters-settings:
  exhaustive:
    default-signifies-exhaustive: true
  gosec:
    excludes:
      # Package manager must run subprocesses with variable args
      - G204
      # Package manager must fetch URLs from config
      - G107
      # Token endpoint URL, not a credential
      - G101
  errcheck:
    exclude-functions:
      - (net/http.ResponseWriter).Write

issues:
  exclude-dirs:
    - vendor
  exclude-rules:
    # Test files: allow unchecked errors in helpers
    - path: _test\.go
      linters:
        - errcheck
    # Test files: 0644 permissions are fine for temp files
    - path: _test\.go
      linters:
        - gosec
